<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shodh — redirecting…</title>
  <!-- This tiny page exists only so that a GitHub Pages site opens the app at
       its root URL. It immediately forwards to shodh.html, which is the actual
       application. If the redirect doesn't fire, use the link below. -->
  <meta http-equiv="refresh" content="0; url=shodh.html">
  <link rel="canonical" href="shodh.html">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           margin: 4rem auto; max-width: 32rem; padding: 0 1rem; line-height: 1.6; }
    a { color: #1a5; }
  </style>
</head>
<body>
  <h1>Shodh · शोध</h1>
  <p>Opening the application…</p>
  <p>If it doesn't open automatically, <a href="shodh.html">click here to launch Shodh</a>.</p>
  <script>
    // Belt-and-braces: redirect via script too, in case meta-refresh is disabled.
    window.location.replace("shodh.html");
  </script>
</body>
</html>
